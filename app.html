<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>泓森拓创科技</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { margin: 0; min-height: 100%; }
      body { -webkit-font-smoothing: antialiased; }
      button, input, select, textarea { outline: none; }
      button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
        box-shadow: 0 0 0 2px rgba(45, 125, 210, 0.35);
      }
      #loading { font-family: "Microsoft YaHei", sans-serif; text-align: center; padding: 3rem; color: #666; }
      #boot-error:empty { display: none; }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="boot-error"></div>
    <div id="root"><div id="loading">正在加载泓森拓创科技…</div></div>
    <script>
      (async function boot() {
        var errEl = document.getElementById("boot-error");
        function showErr(msg) {
          errEl.textContent = "加载失败：\n" + msg;
          errEl.style.cssText = "padding:24px;color:#b91c1c;font:13px/1.5 sans-serif;white-space:pre-wrap";
        }

        function prepareRoot() {
          document.getElementById("root").replaceChildren();
        }

        async function loadGistConfig() {
          var ver = "23";
          for (var i = 0; i < 2; i++) {
            var name = i === 0 ? "gist-config.js" : "gist-config.local.js";
            try {
              var r = await fetch(name + "?v=" + ver);
              if (r.ok) (0, eval)(await r.text());
            } catch (e) { /* optional */ }
          }
        }

        try {
          var SYNC_VER = "23";
          await loadGistConfig();
          // 强制走 runtime .browser.jsx（bundle 已禁用，避免旧 cloud-9 bundle 干扰）
          var bundleRes = await fetch("app.bundle.js?v=" + SYNC_VER);
          if (false && bundleRes.ok) {
            var js = await bundleRes.text();
            if ((js.indexOf("JSONBIN_API_KEY") >= 0 || js.indexOf("api.jsonbin.io") >= 0)
                && js.indexOf("key: configVersion") < 0
                && js.indexOf("cloud-14") >= 0) {
              prepareRoot();
              (0, eval)(js);
              return;
            }
          }

          var files = [
            "src/LogisticsModule.browser.jsx",
            "src/ProductionModule.browser.jsx",
            "src/ToolsModule.browser.jsx",
            "src/AgentsModule.browser.jsx",
            "src/HomeModule.browser.jsx",
            "src/App.browser.jsx",
          ];
          var chunks = [];
          for (var i = 0; i < files.length; i++) {
            var file = files[i] + "?v=" + SYNC_VER;
            var res = await fetch(file);
            if (!res.ok) throw new Error(file + " HTTP " + res.status);
            var code = await res.text();
            if (i > 0) code = code.replace(/^const \{ useState[^}]+\} = React;\s*\r?\n/m, "");
            code = code.replace(/^import .+;\s*\r?\n/gm, "");
            code = code.replace(/^export default /gm, "");
            code = code.replace(/^export /gm, "");
            chunks.push(code);
          }
          var bundled = chunks.join("\n\n");
          var compiled = Babel.transform(bundled, { presets: ["react"], filename: "ops-center.bundle.jsx" }).code;
          prepareRoot();
          (0, eval)(compiled);
        } catch (e) {
          showErr(e.message || String(e));
        }
      })();
    </script>
  </body>
</html>
