<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>泓森拓创科技</title>
    <link rel="stylesheet" href="src/index.css?v=20260624saas" />
    <style>
      #loading { font-family: "Microsoft YaHei", sans-serif; text-align: center; padding: 3rem; color: #666; }
      #boot-error:empty { display: none; }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="boot-error"></div>
    <div id="root"><div id="loading">正在加载泓森拓创科技…</div></div>
    <script>
      (async function boot() {
        var errEl = document.getElementById("boot-error");
        function showErr(msg) {
          errEl.textContent = "加载失败：\n" + msg;
          errEl.style.cssText = "padding:24px;color:#b91c1c;font:13px/1.5 sans-serif;white-space:pre-wrap";
        }

        function prepareRoot() {
          document.getElementById("root").replaceChildren();
        }

        async function loadGistConfig() {
          var ver = "25";
          for (var i = 0; i < 2; i++) {
            var name = i === 0 ? "gist-config.js" : "gist-config.local.js";
            try {
              var r = await fetch(name + "?v=" + ver);
              if (r.ok) (0, eval)(await r.text());
            } catch (e) { /* optional */ }
          }
        }

        function stripModuleSyntax(code) {
          code = code.replace(/import\s+(?:type\s+)?(?:\{[\s\S]*?\}|\*\s+as\s+\w+|\w+)\s+from\s+["'][^"']+["']\s*;?/g, "");
          code = code.replace(/import\s+["'][^"']+["']\s*;?/g, "");
          code = code.replace(/^\s*import\s+.+$/gm, "");
          code = code.replace(/^export\s+default\s+/gm, "");
          code = code.replace(/^export\s+/gm, "");
          code = code.replace(/export\s*\{[\s\S]*?\}\s*from\s+["'][^"']+["']\s*;?/g, "");
          return code;
        }

        try {
          var SYNC_VER = "20260624saas";
          await loadGistConfig();
          var bundleRes = await fetch("app.bundle.js?v=" + SYNC_VER);
          if (bundleRes.ok) {
            var js = await bundleRes.text();
            if (js.indexOf("function CloudSyncProvider") >= 0 && js.indexOf("ops-sidebar") >= 0 && !/\bimport\s+[\{\*]/.test(js)) {
              prepareRoot();
              (0, eval)(js);
              return;
            }
          }

          var files = [
            "src/LogisticsModule.browser.jsx",
            "src/ProductionModule.browser.jsx",
            "src/ToolsModule.browser.jsx",
            "src/AgentsModule.browser.jsx",
            "src/KnowledgeModule.browser.jsx",
            "src/HomeModule.browser.jsx",
            "src/KpiModule.browser.jsx",
            "src/GlobalCloudSync.browser.jsx",
            "src/App.browser.jsx",
          ];
          function stripConfirmDeleteDefs(code) {
            code = code.replace(/\/\/[^\n]*CONFIRM DELETE[^\n]*\r?\n/g, "");
            code = code.replace(/const confirmDeleteWarning[\s\S]*?\);\s*\r?\n/g, "");
            code = code.replace(/function confirmDeleteWarning\s*\([^)]*\)\s*\{[\s\S]*?\}\s*\r?\n/g, "");
            return code;
          }
          var confirmDeleteHelper =
            "function confirmDeleteWarning(name, typeLabel) {\n" +
            "  return window.confirm(\n" +
            "    `⚠️ 警告\\n\\n确定删除${typeLabel}「${name}」吗？\\n\\n删除后无法恢复，链接与配置将从本机浏览器中永久移除。`\n" +
            "  );\n" +
            "}\n\n";
          var chunks = [];
          for (var i = 0; i < files.length; i++) {
            var file = files[i] + "?v=" + SYNC_VER;
            var res = await fetch(file);
            if (!res.ok) throw new Error(file + " HTTP " + res.status);
            var code = await res.text();
            if (i > 0) code = code.replace(/^const \{ useState[^}]+\} = React;\s*\r?\n/m, "");
            code = stripModuleSyntax(code);
            code = stripConfirmDeleteDefs(code);
            chunks.push(code);
          }
          var bundled = confirmDeleteHelper + chunks.join("\n\n");
          var compiled = Babel.transform(bundled, { presets: ["react"], filename: "ops-center.bundle.jsx" }).code;
          if (/\bimport\s+[\{\*]/.test(compiled)) throw new Error("编译后仍含 import，请运行 rebuild-bundle.bat 重新生成");
          prepareRoot();
          (0, eval)(compiled);
        } catch (e) {
          showErr(e.message || String(e));
        }
      })();
    </script>
  </body>
</html>
