<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MailWatch 邮件分析</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #fff;
      --border: #e2e8f0;
      --text: #1a202c;
      --muted: #64748b;
      --primary: #2d7dd2;
      --ok: #2e7d32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 6px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    button {
      appearance: none;
      border: none;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 15px;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.05); }
    button:disabled { opacity: 0.6; cursor: wait; }
    .note { font-size: 12px; color: var(--muted); margin-top: 12px; }
    #log {
      margin-top: 12px;
      padding: 12px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      font-size: 12px;
      font-family: Consolas, monospace;
      white-space: pre-wrap;
      display: none;
    }
    #log.show { display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📧 MailWatch 邮件分析</h1>
    <p class="sub">无需分两步：点一次即可（未运行时会自动启动服务）</p>

    <div class="card">
      <button type="button" id="btnOpen">打开 MailWatch ↗</button>
      <p class="note">首次启动会弹出 MailWatch 命令行窗口，请勿关闭。安装路径：D:\Projects\mailwatch</p>
    </div>

    <div id="log"></div>
  </div>

  <script>
    (function () {
      var APP_URL = "http://127.0.0.1:8000";
      var btn = document.getElementById("btnOpen");
      var logEl = document.getElementById("log");

      function log(msg) {
        logEl.textContent = msg;
        logEl.classList.add("show");
      }

      function sleep(ms) {
        return new Promise(function (r) { setTimeout(r, ms); });
      }

      async function openMailWatch() {
        var target = APP_URL;
        btn.disabled = true;
        log("正在准备…");
        try {
          var statusRes = await fetch("/api/mailwatch/status");
          if (statusRes.ok) {
            var status = await statusRes.json();
            if (status.appUrl) target = status.appUrl;
            if (!status.running) {
              log("正在启动 MailWatch 服务…");
              await fetch("/api/mailwatch/launch", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "start" })
              });
              for (var i = 0; i < 20; i++) {
                await sleep(1500);
                var next = await fetch("/api/mailwatch/status").then(function (r) { return r.json(); }).catch(function () { return null; });
                if (next && next.running) break;
                log("等待服务就绪… (" + (i + 1) + "/20)");
              }
            }
          }
        } catch (e) {
          log("无法连接本地 API，将直接尝试打开浏览器。");
        }
        window.open(target, "_blank", "noopener,noreferrer");
        log("已打开 MailWatch。若页面空白，请稍等几秒后刷新。");
        btn.disabled = false;
      }

      btn.addEventListener("click", openMailWatch);
    })();
  </script>
</body>
</html>
